# Railway config-as-code. Schema verified via Context7 (/websites/railway, 2026-05-26).
# Build from the Dockerfile; health-check the aiohttp GET /health route; restart on
# crash with an EXPLICIT retry cap (Railway's default is not relied upon).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -m bot.main"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
